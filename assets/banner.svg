<svg xmlns="http://www.w3.org/2000/svg" width="820" height="206" viewBox="0 0 820 206" role="img" aria-label="Daniel Schreiber — Backend &amp; Systems Engineer">
<defs>
<style>
@font-face{font-family:'JBM';font-style:normal;font-weight:400;src:url(data:font/woff2;base64,) format('woff2');}
@font-face{font-family:'JBM';font-style:normal;font-weight:700;src:url(data:font/woff2;base64,) format('woff2');}
text{font-family:'JBM','JetBrains Mono',ui-monospace,monospace;font-size:19px;font-weight:400;}
.kw{fill:#ff6188;} .cls{fill:#a9dc76;font-weight:700;} .fg{fill:#fcfcfa;}
.str{fill:#ffd866;} .b{fill:#78dce8;} .o{fill:#fc9867;} .p{fill:#ab9df2;} .mut{fill:#939293;}
.win{animation:fade .9s ease-out both;}
.cur{animation:blink 1.1s steps(1) infinite;}
