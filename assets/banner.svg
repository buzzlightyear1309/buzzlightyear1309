<line x1="0" y1="42" x2="820" y2="42" stroke="#403e41" stroke-width="1"/>
<text x="24" y="72" xml:space="preserve"><tspan class="kw">class </tspan><tspan class="cls">DanielSchreiber</tspan><tspan class="fg">:</tspan></text>
<text x="24" y="104" xml:space="preserve"><tspan class="fg">    role  </tspan><tspan class="kw">= </tspan><tspan class="str">"Backend &amp; Systems Engineer"</tspan></text>
