<svg xmlns="http://www.w3.org/2000/svg" width="640" height="44" viewBox="0 0 640 44" role="img" aria-label="I build modular backend systems that stay up.">
<defs>
<style>
@font-face{font-family:'JBM';font-weight:700;src:url(data:font/woff2;base64,) format('woff2');}
.txt{font-family:'JBM','JetBrains Mono',ui-monospace,monospace;font-size:22px;font-weight:700;fill:#ff6188;animation:hue 33s step-end infinite;}
.clip{transform-box:fill-box;transform-origin:left center;animation:type 5.5s infinite;}
.caret{fill:#ff6188;animation:move 5.5s infinite, blink 1s steps(1) infinite, hue 33s step-end infinite;}
@keyframes type{
 0%{transform:scaleX(0);animation-timing-function:steps(45,end);}
 54.5%{transform:scaleX(1);animation-timing-function:linear;}
 72.7%{transform:scaleX(1);animation-timing-function:steps(45,end);}
 100%{transform:scaleX(0);}
}
@keyframes move{
 0%{transform:translateX(0);animation-timing-function:steps(45,end);}
 54.5%{transform:translateX(594px);animation-timing-function:linear;}
 72.7%{transform:translateX(594px);animation-timing-function:steps(45,end);}
 100%{transform:translateX(0);}
}
@keyframes blink{50%{opacity:0;}}
@keyframes hue{0.0%{fill:#ff6188;}16.667%{fill:#fc9867;}33.333%{fill:#ffd866;}50.0%{fill:#a9dc76;}66.667%{fill:#78dce8;}83.333%{fill:#ab9df2;}}
</style>
<clipPath id="rv"><rect class="clip" x="20" y="0" width="594" height="44"/></clipPath>
</defs>
<text class="txt" x="20" y="30" clip-path="url(#rv)">I build modular backend systems that stay up.</text>
<rect class="caret" x="20" y="9" width="3" height="26" rx="1"/>
</svg>
